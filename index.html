<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>V1 Range Shooter</title>
    <style>
        :root {
            --primary: #ff3b30;
            --primary-glow: rgba(255, 59, 48, 0.6);
            --bg-dark: rgba(10, 10, 12, 0.9);
            --border-ui: rgba(255, 255, 255, 0.1);
            --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
            font-family: var(--font);
            color: #fff;
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url('b-background.png');
            background-size: cover;
            background-position: center;
            transition: opacity 0.8s ease-in-out;
        }

        /* Fallback gradient if b-background.png is missing */
        #splash::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(20,20,30,0.4) 0%, rgba(5,5,10,0.95) 100%);
            z-index: -1;
        }

        .splash-content {
            text-align: center;
            background: var(--bg-dark);
            padding: 40px 60px;
            border-radius: 12px;
            border: 1px solid var(--border-ui);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .loader-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-bottom: 25px;
            overflow: hidden;
            position: relative;
        }

        .loader-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            transition: width 0.3s ease;
        }

        .loader-text {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 20px;
            min-height: 18px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 36px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary-glow);
            transition: all 0.2s ease;
            opacity: 0.5;
            pointer-events: none;
        }

        .btn.ready {
            opacity: 1;
            pointer-events: auto;
        }

        .btn.ready:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--primary);
        }

        .btn.ready:active {
            transform: translateY(1px);
        }

        /* Main Canvas */
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Head-Up Display (HUD) */
        #hud {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 20px;
            pointer-events: none;
        }

        .hud-card {
            background: var(--bg-dark);
            border: 1px solid var(--border-ui);
            padding: 12px 24px;
            border-radius: 8px;
            backdrop-filter: blur(8px);
            text-align: right;
            min-width: 120px;
        }

        .hud-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .hud-value {
            font-size: 1.6rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }

        /* Settings Menu (Top Left) */
        #settings-menu {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
        }

        .settings-trigger {
            background: var(--bg-dark);
            border: 1px solid var(--border-ui);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .settings-trigger:hover {
            border-color: rgba(255,255,255,0.3);
        }

        .settings-trigger svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.5s ease;
        }

        .settings-trigger.open svg {
            transform: rotate(90deg);
        }

        .settings-content {
            position: absolute;
            top: 55px;
            left: 0;
            background: var(--bg-dark);
            border: 1px solid var(--border-ui);
            border-radius: 8px;
            padding: 20px;
            width: 260px;
            display: none;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .settings-content.open {
            display: flex;
        }

        .settings-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .settings-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-ui);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.9rem;
            width: 100%;
            transition: background 0.2s;
        }

        select:hover {
            background: rgba(255,255,255,0.1);
        }

        select option {
            background: #111;
            color: white;
        }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            box-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
        }

        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 59, 48, 0.4);
        }
        /* Subtle crosshair lines */
        #crosshair::before {
            top: 50%; left: -12px; width: 8px; height: 2px; transform: translateY(-50%);
        }
        #crosshair::after {
            top: -12px; left: 50%; width: 2px; height: 8px; transform: translateX(-50%);
        }

        /* Game Over Overlay */
        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 8, 0.9);
            z-index: 50;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .game-over-content {
            text-align: center;
            background: var(--bg-dark);
            padding: 40px 60px;
            border-radius: 12px;
            border: 1px solid var(--border-ui);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            max-width: 450px;
            width: 90%;
        }

        .game-over-title {
            font-size: 2.2rem;
            color: var(--primary);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .stats-summary {
            margin: 20px 0 35px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 6px;
            font-size: 1.1rem;
        }

        .stat-line span:last-child {
            font-weight: bold;
            color: #fff;
        }

        /* Hit Indicator */
        #hit-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 59, 48, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
            opacity: 0;
            transition: transform 0.1s ease-out, opacity 0.1s ease-out;
        }

        #hit-indicator.active {
            transform: translate(-50%, -50%) scale(1.5);
            opacity: 1;
        }
    </style>
    <!-- Three.js + GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash">
        <div class="splash-content">
            <h1>V1 Range Shooter</h1>
            <p class="subtitle">Elite Live Fire Simulation</p>
            <div class="loader-container">
                <div class="loader-bar" id="loader-bar"></div>
            </div>
            <div class="loader-text" id="loader-text">Initializing Systems...</div>
            <button class="btn" id="start-btn">Enter Range</button>
        </div>
    </div>

    <!-- Main 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Static Center Laser Crosshair -->
    <div id="crosshair"></div>
    <div id="hit-indicator"></div>

    <!-- HUD Overlay -->
    <div id="hud">
        <div class="hud-card">
            <div class="hud-label">Time Remaining</div>
            <div class="hud-value" id="hud-timer">00:00</div>
        </div>
        <div class="hud-card">
            <div class="hud-label">Score</div>
            <div class="hud-value" id="hud-score">00</div>
        </div>
        <div class="hud-card">
            <div class="hud-label">Accuracy</div>
            <div class="hud-value" id="hud-accuracy">100%</div>
        </div>
    </div>

    <!-- Settings Menu -->
    <div id="settings-menu">
        <button class="settings-trigger" id="settings-toggle" title="Settings">
            <svg viewBox="0 0 24 24">
                <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
            </svg>
        </button>
        <div class="settings-content" id="settings-panel">
            <div class="settings-group">
                <label class="settings-label" for="weapon-select">Weapon Armament</label>
                <select id="weapon-select">
                    <option value="sm_gun">SMG (Standard)</option>
                    <option value="hand_gun">Handgun (Secondary)</option>
                    <option value="sci-fi_pistol">Sci-Fi Pistol (Tertiary)</option>
                </select>
            </div>
            <div class="settings-group">
                <label class="settings-label" for="timer-select">Round Duration</label>
                <select id="timer-select">
                    <option value="60">1 Minute</option>

            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over">
        <div class="game-over-content">
            <div class="game-over-title">Session Complete</div>
            <div class="stats-summary">
                <div class="stat-line">
                    <span>Total Score</span>
                    <span id="summary-score">0</span>
                </div>
                <div class="stat-line">
                    <span>Accuracy Rating</span>
                    <span id="summary-accuracy">0%</span>
                </div>
                <div class="stat-line">
                    <span>Shots Fired</span>
                    <span id="summary-shots">0</span>
                </div>
            </div>
            <button class="btn ready" id="restart-btn">Restart Session</button>

    <script>
        // --- GAME CONFIGURATION & STATE ---
        const CONFIG = {
            cacheName: 'v1-fps-cache-v1',
            assets: {
                essential: [
                    { name: 'sm_gun.glb', type: 'model' },
                    { name: 'shooting_range_target.glb', type: 'model' },
                    { name: 'gun-shot-1.mp3', type: 'audio' }
                ],
                lazy: [
                    { name: 'hand_gun.glb', type: 'model' },
                    { name: 'sci-fi_pistol.glb', type: 'model' },
                    { name: 'gun-fire-2.mp3', type: 'audio' }
                ]
            }
        };

        const STATE = {
            score: 0,
            shotsFired: 0,
            hits: 0,
            timeRemaining: 60,
            gameActive: false,
            currentWeaponId: 'sm_gun',
            loadedAssets: {},
            activeAudio: null,
            pointer: { x: 0, y: 0 },
            pointerTarget: { x: 0, y: 0 }
        };

        // --- BROWSER CACHING SYSTEM (Cache API) ---
        async function getCachedOrFetch(url) {
            if (!('caches' in window)) return fetch(url);
            const cache = await caches.open(CONFIG.cacheName);
            const cachedResponse = await cache.match(url);
            if (cachedResponse) {
                return cachedResponse;
            }
            try {
                const networkResponse = await fetch(url);
                if (networkResponse.ok) {
                    await cache.put(url, networkResponse.clone());
                }
                return networkResponse;
            } catch (e) {
                console.warn(`Network fetch failed for ${url}. Attempting local/procedural fallback.`);
                throw e;
            }
        }

        // --- AUDIO SYNTHESIZER FALLBACKS (Zero external dependancy safety) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function synthesizeShot(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            
            const gain = audioCtx.createGain();

            if (type === 'rapid') {
                // Sci-Fi / Rapid sound
                filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            } else {
                // Standard Heavy Gunshot
                filter.frequency.setValueAtTime(800, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(1.0, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
            }

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }

        // Audio Reset & Playback (Anti-Overlap Requirement)
        function playGunSound() {
            const isRapid = STATE.currentWeaponId === 'sci-fi_pistol';
            const audioName = isRapid ? 'gun-fire-2.mp3' : 'gun-shot-1.mp3';
            const audioObj = STATE.loadedAssets[audioName];

            if (audioObj && audioObj instanceof Audio) {
                // Strict Audio Reset
                audioObj.pause();
                audioObj.currentTime = 0;
                audioObj.play().catch(() => {
                    // Fallback to synth if browser blocks play
                    synthesizeShot(isRapid ? 'rapid' : 'standard');
                });
            } else {
                // Fallback direct synthesis
                synthesizeShot(isRapid ? 'rapid' : 'standard');
            }
        }

        // --- PROCEDURAL 3D ASSET GENERATORS (Fallback Guarantee) ---
        function createProceduralGun(type) {
            const gunGroup = new THREE.Group();
            
            // Materials
            const metalMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.2, metalness: 0.8 });
            const accentMat = new THREE.MeshStandardMaterial({ 
                color: type === 'sci-fi_pistol' ? 0x00ffff : (type === 'hand_gun' ? 0x333333 : 0xff3b30), 
                roughness: 0.5 
            });
            const emissiveMat = new THREE.MeshBasicMaterial({ color: type === 'sci-fi_pistol' ? 0x00ffff : 0xff0000 });

            if (type === 'hand_gun') {
                // Grip
                const grip = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.12, 0.05), metalMat);
                grip.position.set(0, -0.05, 0.02);
                grip.rotation.x = -0.2;
                gunGroup.add(grip);
                // Slide / Barrel
                const slide = new THREE.Mesh(new THREE.BoxGeometry(0.045, 0.05, 0.22), metalMat);
                slide.position.set(0, 0.02, -0.04);
                gunGroup.add(slide);
            } else if (type === 'sci-fi_pistol') {
                // Futuristic design
                const grip = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.14, 0.06), metalMat);
                grip.position.set(0, -0.06, 0.03);
                grip.rotation.x = -0.3;
                gunGroup.add(grip);

                const frame = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.06, 0.26), metalMat);
                frame.position.set(0, 0.02, -0.06);
                gunGroup.add(frame);

                const barrel1 = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.2), accentMat);
                barrel1.rotation.x = Math.PI / 2;
                barrel1.position.set(0.012, 0.03, -0.08);
                
                const barrel2 = barrel1.clone();
                barrel2.position.x = -0.012;
                gunGroup.add(barrel1, barrel2);

                const glowLine = new THREE.Mesh(new THREE.BoxGeometry(0.005, 0.01, 0.15), emissiveMat);
                glowLine.position.set(0, 0.04, -0.05);
                gunGroup.add(glowLine);
            } else {
                // Default: sm_gun (Submachine Gun style)
                const grip = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.15, 0.06), metalMat);
                grip.position.set(0, -0.07, 0.05);
                grip.rotation.x = -0.1;
                gunGroup.add(grip);

                const receiver = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.07, 0.35), metalMat);
                receiver.position.set(0, 0.02, -0.05);
                gunGroup.add(receiver);

                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.25), metalMat);
                barrel.rotation.x = Math.PI / 2;
                barrel.position.set(0, 0.02, -0.25);
                gunGroup.add(barrel);

                const handguard = new THREE.Mesh(new THREE.BoxGeometry(0.055, 0.06, 0.18), accentMat);
                handguard.position.set(0, 0.01, -0.14);
                gunGroup.add(handguard);

                const mag = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.18, 0.05), metalMat);
                mag.position.set(0, -0.12, -0.08);
                mag.rotation.x = 0.1;
                gunGroup.add(mag);
            }

            // Ensure proper alignment
            gunGroup.position.set(0.25, -0.25, -0.55);
            return gunGroup;
        }

        function createProceduralTarget() {
            const targetGroup = new THREE.Group();
            
            // Target face (concentric rings)
            const ringGeom = new THREE.CylinderGeometry(0.5, 0.5, 0.05, 32);
            ringGeom.rotateX(Math.PI / 2);
            
            const outerRing = new THREE.Mesh(ringGeom, new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 }));
            outerRing.castShadow = true;
            targetGroup.add(outerRing);

            const midRing = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.06, 32), new THREE.MeshStandardMaterial({ color: 0xff3b30, roughness: 0.5 }));
            midRing.geometry.rotateX(Math.PI / 2);
            targetGroup.add(midRing);

            const innerRing = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.07, 32), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 }));
            innerRing.geometry.rotateX(Math.PI / 2);
            targetGroup.add(innerRing);

            const bullseye = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.08, 32), new THREE.MeshStandardMaterial({ color: 0xff3b30, roughness: 0.5 }));
            bullseye.geometry.rotateX(Math.PI / 2);
            targetGroup.add(bullseye);

            // Stand
            const stand = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 1.8), new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 }));
            stand.position.y = -0.9;
            stand.castShadow = true;
            targetGroup.add(stand);

            targetGroup.scale.set(1.5, 1.5, 1.5);
            return targetGroup;
        }

        // --- ASSET PIPELINE & LOADING ---
        class AssetPipeline {
            constructor() {
                this.gltfLoader = new THREE.GLTFLoader();
                this.totalEssential = CONFIG.assets.essential.length;
                this.loadedEssential = 0;
            }

            async init() {
                // Load essential assets first (Progressive Loading Requirement)
                for (const asset of CONFIG.assets.essential) {
                    try {
                        await this.load(asset);
                    } catch (e) {
                        console.error(`Essential asset failed: ${asset.name}. Using procedural fallback.`);
                    }
                    this.loadedEssential++;
                    this.updateProgress();
                }

                // Enable Play instantly
                document.getElementById('start-btn').classList.add('ready');
                document.getElementById('loader-text').innerText = "Systems Nominal. Ready for Fire.";

                // Lazy load remaining assets in background
                this.lazyLoadRemaining();
            }

            async load(asset) {
                try {
                    const response = await getCachedOrFetch(asset.name);
                    const blob = await response.blob();
                    const objectURL = URL.createObjectURL(blob);

                    if (asset.type === 'model') {
                        return new Promise((resolve, reject) => {
                            this.gltfLoader.load(objectURL, 
                                (gltf) => {
                                    STATE.loadedAssets[asset.name] = gltf.scene;
                                    resolve();
                                }, 
                                undefined, 
                                (err) => reject(err)
                            );
                        });
                    } else if (asset.type === 'audio') {
                        const audio = new Audio(objectURL);
                        STATE.loadedAssets[asset.name] = audio;
                        return Promise.resolve();
                    }
                } catch (e) {
                    // Fail silently, fallbacks handle runtime generation
                    return Promise.resolve();
                }
            }

            async lazyLoadRemaining() {
                for (const asset of CONFIG.assets.lazy) {
                    try {
                        await this.load(asset);
                    } catch (e) {
                        console.warn(`Lazy asset failed: ${asset.name}`);
                    }
                }
            }

            updateProgress() {
                const percent = (this.loadedEssential / this.totalEssential) * 100;
                document.getElementById('loader-bar').style.width = `${percent}%`;
                document.getElementById('loader-text').innerText = `Calibrating Range: ${Math.round(percent)}%`;
            }
        }

        // --- ENGINE ARCHITECTURE ---
        class GameEngine {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 100);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                
                this.targets = [];
                this.particles = [];
                this.weaponPivot = new THREE.Group();
                this.activeWeaponMesh = null;
                this.raycaster = new THREE.Raycaster();
                
                this.initGraphics();
                this.initEnvironment();
                this.initWeaponSystem();
                this.initTargets();
                this.initInput();
                
                window.addEventListener('resize', this.onResize.bind(this));
            }

            initGraphics() {
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.0;
                this.container.appendChild(this.renderer.domElement);

                // Sky background gradient
                this.scene.background = new THREE.Color(0x11141a);
                this.scene.fog = new THREE.FogExp2(0x11141a, 0.015);
            }

            initEnvironment() {
                // Daylight Lighting Setup (High Visibility Requirement)
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
                this.scene.add(ambientLight);

                const sunLight = new THREE.DirectionalLight(0xfffaed, 1.4);
                sunLight.position.set(30, 40, 20);
                sunLight.castShadow = true;
                sunLight.shadow.mapSize.width = 2048;
                sunLight.shadow.mapSize.height = 2048;
                sunLight.shadow.camera.near = 0.5;
                sunLight.shadow.camera.far = 150;
                const d = 40;
                sunLight.shadow.camera.left = -d;
                sunLight.shadow.camera.right = d;
                sunLight.shadow.camera.top = d;
                sunLight.shadow.camera.bottom = -d;
                this.scene.add(sunLight);

                const fillLight = new THREE.HemisphereLight(0x9fc5e8, 0x8fbc8f, 0.4);
                this.scene.add(fillLight);

                // Procedural Range Environment
                // Ground
                const groundGeo = new THREE.PlaneGeometry(200, 200);
                const groundMat = new THREE.MeshStandardMaterial({ 
                    color: 0x22252a, 
                    roughness: 0.8,
                    metalness: 0.1
                });
                const ground = new THREE.Mesh(groundGeo, groundMat);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                this.scene.add(ground);

                // Grid overlay for tactical feel
                const grid = new THREE.GridHelper(200, 100, 0x444444, 0x222222);
                grid.position.y = 0.01;
                this.scene.add(grid);

                // Shooting lane partition walls (Procedural)
                const wallMat = new THREE.MeshStandardMaterial({ color: 0x1b1d22, roughness: 0.7 });
                for (let i = -1; i <= 1; i += 2) {
                    const wall = new THREE.Mesh(new THREE.BoxGeometry(0.4, 4, 15), wallMat);
                    wall.position.set(i * 4, 2, -5);
                    wall.castShadow = true;
                    wall.receiveShadow = true;
                    this.scene.add(wall);
                }

                // Front safety wall/berm
                const berm = new THREE.Mesh(new THREE.BoxGeometry(60, 8, 2), wallMat);
                berm.position.set(0, 4, -40);
                berm.receiveShadow = true;
                this.scene.add(berm);
            }

            initWeaponSystem() {
                // Attach weapon pivot to camera so it tracks view
                this.camera.add(this.weaponPivot);
                this.scene.add(this.camera);
                this.camera.position.set(0, 1.6, 0); // Eye height

                this.mountWeapon(STATE.currentWeaponId);
            }

            mountWeapon(weaponId) {
                // Clear active
                if (this.activeWeaponMesh) {
                    this.weaponPivot.remove(this.activeWeaponMesh);
                }

                const assetName = `${weaponId}.glb`;
                let model = STATE.loadedAssets[assetName];

                if (model) {
                    // Clone to avoid mutation issues
                    this.activeWeaponMesh = model.clone();
                    // Auto-align model based on standard gltf configurations
                    this.activeWeaponMesh.position.set(0.2, -0.22, -0.45);
                    this.activeWeaponMesh.rotation.set(0, Math.PI, 0); // Rotate to face forward
                } else {
                    // Fallback to highly detailed procedural model
                    this.activeWeaponMesh = createProceduralGun(weaponId);
                }

                // Enable shadow casting on weapon
                this.activeWeaponMesh.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                this.weaponPivot.add(this.activeWeaponMesh);
            }

            initTargets() {
                // Maintain 3 active target lanes at different depths
                const depths = [-15, -25, -35];
                depths.forEach((depth, index) => {
                    this.spawnTarget(index, depth);
                });
            }

            spawnTarget(index, depth) {
                // Remove existing if any
                if (this.targets[index]) {
                    this.scene.remove(this.targets[index].mesh);
                }

                const assetName = 'shooting_range_target.glb';
                let targetMesh;

                if (STATE.loadedAssets[assetName]) {
                    targetMesh = STATE.loadedAssets[assetName].clone();
                    targetMesh.scale.set(1.2, 1.2, 1.2);
                } else {
                    targetMesh = createProceduralTarget();
                }

                // Randomize horizontal placement within lane bounds
                const rangeX = 2.5;
                const x = (Math.random() - 0.5) * rangeX * 2;
                const y = 0.5 + Math.random() * 1.2; // Variable height

                targetMesh.position.set(x, y, depth);
                
                // Ensure proper orientation facing the player
                targetMesh.rotation.y = 0;

                targetMesh.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        child.userData.targetIndex = index; // Tag for raycasting
                    }
                });

                this.scene.add(targetMesh);
                
                this.targets[index] = {
                    mesh: targetMesh,
                    depth: depth,
                    isHit: false,
                    hitTime: 0,
                    origY: y,
                    bobSeed: Math.random() * 100
                };
            }

            initInput() {
                // Pointer Tracking
                const onPointerMove = (e) => {
                    const x = (e.clientX / window.innerWidth) * 2 - 1;
                    const y = -(e.clientY / window.innerHeight) * 2 + 1;
                    
                    // Aim boundaries
                    STATE.pointerTarget.x = x * 0.4;
                    STATE.pointerTarget.y = y * 0.3;
                };

                window.addEventListener('mousemove', onPointerMove);
                window.addEventListener('touchmove', (e) => {
                    if (e.touches.length > 0) {
                        onPointerMove(e.touches[0]);
                    }
                });

                // Fire Trigger
                const triggerFire = () => {
                    if (!STATE.gameActive) return;
                    this.fireWeapon();
                };

                window.addEventListener('mousedown', triggerFire);
                window.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    triggerFire();
                }, { passive: false });
            }

            fireWeapon() {
                STATE.shotsFired++;
                
                // Audio Execution
                playGunSound();

                // Recoil animation trigger
                this.weaponPivot.position.z = 0.08;
                this.weaponPivot.rotation.x = 0.08;

                // Hit Detection using Raycasting (Exact screen center)
                this.raycaster.setFromCamera(new THREE.Vector2(0, 0), this.camera);
                
                // Collect target meshes for intersection
                const targetMeshes = [];
                this.targets.forEach(t => {
                    if (!t.isHit) {
                        targetMeshes.push(t.mesh);
                    }
                });

                const intersects = this.raycaster.intersectObjects(targetMeshes, true);

                if (intersects.length > 0) {
                    // Find root target group tagged with index
                    let hitMesh = intersects[0].object;
                    let targetIndex = null;
                    
                    while (hitMesh.parent) {
                        if (hitMesh.userData.targetIndex !== undefined) {
                            targetIndex = hitMesh.userData.targetIndex;
                            break;
                        }
                        hitMesh = hitMesh.parent;
                    }

                    if (targetIndex !== null) {
                        this.handleTargetHit(targetIndex, intersects[0].point);
                    }
                }

                this.updateHUD();
            }

            handleTargetHit(index, hitPoint) {
                const target = this.targets[index];
                target.isHit = true;
                target.hitTime = performance.now();

                STATE.hits++;
                STATE.score += 10;

                // Trigger Hit Marker UI
                const marker = document.getElementById('hit-indicator');
                marker.classList.remove('active');
                void marker.offsetWidth; // Force reflow
                marker.classList.add('active');
                setTimeout(() => marker.classList.remove('active'), 120);

                // Spawn 3D Impact Particles
                this.spawnImpactParticles(hitPoint);
            }

            spawnImpactParticles(pos) {
                const particleCount = 12;
                const geometry = new THREE.BoxGeometry(0.04, 0.04, 0.04);
                const material = new THREE.MeshBasicMaterial({ color: 0xff3b30 });

                for (let i = 0; i < particleCount; i++) {
                    const p = new THREE.Mesh(geometry, material);
                    p.position.copy(pos);
                    
                    // Random velocities
                    p.userData.velocity = new THREE.Vector3(
                        (Math.random() - 0.5) * 4,
                        (Math.random() - 0.2) * 5,
                        (Math.random() - 0.5) * 4
                    );
                    p.userData.life = 1.0; // Decay factor

                    this.scene.add(p);
                    this.particles.push(p);
                }
            }

            updateHUD() {
                document.getElementById('hud-score').innerText = String(STATE.score).padStart(2, '0');
                const accuracy = STATE.shotsFired > 0 ? Math.round((STATE.hits / STATE.shotsFired) * 100) : 100;
                document.getElementById('hud-accuracy').innerText = `${accuracy}%`;
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            update(time) {
                // Smooth Weapon Tracking (Lerp Requirement)
                STATE.pointer.x += (STATE.pointerTarget.x - STATE.pointer.x) * 0.15;
                STATE.pointer.y += (STATE.pointerTarget.y - STATE.pointer.y) * 0.15;

                // Rotate camera/view slightly to follow pointer, weapon pivots in opposite way for parallax effect
                this.camera.rotation.y = -STATE.pointer.x * 0.5;
                this.camera.rotation.x = STATE.pointer.y * 0.4;

                // Breath/Idle animation on weapon
                const idleBob = Math.sin(time * 0.002) * 0.002;
                this.weaponPivot.position.y += (idleBob - this.weaponPivot.position.y) * 0.1;

                // Recover from recoil
                this.weaponPivot.position.z += (0 - this.weaponPivot.position.z) * 0.15;
                this.weaponPivot.rotation.x += (0 - this.weaponPivot.rotation.x) * 0.15;

                // Handle Targets (Animation & Reset)
                const now = performance.now();
                this.targets.forEach((target, index) => {
                    if (target.isHit) {
                        // Spin and fall animation
                        const elapsed = now - target.hitTime;
                        if (elapsed < 600) {
                            target.mesh.rotation.y += 0.25;
                            target.mesh.position.y -= 0.05;
                        } else {
                            // Reset target
                            this.spawnTarget(index, target.depth);
                        }
                    } else {
                        // Subtle target bobbing
                        const bob = Math.sin((time * 0.001) + target.bobSeed) * 0.08;
                        target.mesh.position.y = target.origY + bob;
                    }
                });

                // Handle Particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.position.addScaledVector(p.userData.velocity, 0.016);
                    p.userData.velocity.y -= 0.15; // Gravity
                    p.userData.life -= 0.025;
                    p.material.opacity = p.userData.life;
                    
                    if (p.userData.life <= 0) {
                        this.scene.remove(p);
                        this.particles.splice(i, 1);
                    }
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

        // --- GAME FLOW CONTROLLER ---
        window.addEventListener('DOMContentLoaded', async () => {
            const pipeline = new AssetPipeline();
            await pipeline.init();

            const engine = new GameEngine();

            // Menu Interactions
            const settingsToggle = document.getElementById('settings-toggle');
            const settingsPanel = document.getElementById('settings-panel');
            
            settingsToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                settingsToggle.classList.toggle('open');
                settingsPanel.classList.toggle('open');
            });

            document.addEventListener('click', () => {
                settingsToggle.classList.remove('open');
                settingsPanel.classList.remove('open');
            });

            settingsPanel.addEventListener('click', (e) => e.stopPropagation());

            // Dropdown Handlers
            document.getElementById('weapon-select').addEventListener('change', (e) => {
                STATE.currentWeaponId = e.target.value;
                engine.mountWeapon(STATE.currentWeaponId);
            });

            document.getElementById('timer-select').addEventListener('change', (e) => {
                STATE.timeRemaining = parseInt(e.target.value);
                updateTimerDisplay();
            });

            // Start Game
            const startBtn = document.getElementById('start-btn');
            startBtn.addEventListener('click', () => {
                document.getElementById('splash').style.opacity = 0;
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    startGame();
                }, 800);
            });

            // Restart Game
            document.getElementById('restart-btn').addEventListener('click', () => {
                document.getElementById('game-over').style.display = 'none';
                startGame();
            });

            let gameTimerInterval;

            function startGame() {
                // Reset State
                STATE.score = 0;
                STATE.shotsFired = 0;
                STATE.hits = 0;
                STATE.timeRemaining = parseInt(document.getElementById('timer-select').value);
                STATE.gameActive = true;

                engine.updateHUD();
                updateTimerDisplay();

                // Start Timer Countdown
                clearInterval(gameTimerInterval);
                gameTimerInterval = setInterval(() => {
                    STATE.timeRemaining--;
                    updateTimerDisplay();

                    if (STATE.timeRemaining <= 0) {
                        endGame();
                    }
                }, 1000);
            }

            function updateTimerDisplay() {
                const mins = String(Math.floor(STATE.timeRemaining / 60)).padStart(2, '0');
                const secs = String(STATE.timeRemaining % 60).padStart(2, '0');
                document.getElementById('hud-timer').innerText = `${mins}:${secs}`;
            }

            function endGame() {
                STATE.gameActive = false;
                clearInterval(gameTimerInterval);

                // Show Game Over Overlay with statistics
                document.getElementById('summary-score').innerText = STATE.score;
                const acc = STATE.shotsFired > 0 ? Math.round((STATE.hits / STATE.shotsFired) * 100) : 0;
                document.getElementById('summary-accuracy').innerText = `${acc}%`;
                document.getElementById('summary-shots').innerText = STATE.shotsFired;

                document.getElementById('game-over').style.display = 'flex';
            }

            // High Performance Animation Loop
            function tick(time) {
                requestAnimationFrame(tick);
                engine.update(time);
            }
            requestAnimationFrame(tick);
        });
    </script>
</body>
